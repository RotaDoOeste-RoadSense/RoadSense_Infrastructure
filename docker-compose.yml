    deploy:
        resources:
          reservations:
            devices:
              - capabilities: [gpu]
  fastapi_vegetacao:
    build:
      context: ./FASTAPI_VEGETACAO
      dockerfile: Dockerfile
    ports:
      - "8300:8300"
    depends_on:
      # - nosql
      - sql
    deploy:
        resources:
          reservations:
            devices:
              - capabilities: [gpu]   
  fastapi_yolo_truck:
