  #   volumes:
  #     - mongo-data:/data/db
  sql:
    build:
      context: ./SQL
      dockerfile: Dockerfile
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
volumes:
  mongo-data:
  mysql-data:
