version: '3.8'

services:
  ui_node:
    build:
      context: ./UserInterface
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      # - nosql
      - sql
      - fastapi_yolo
      - fastapi_gps
    deploy:
        resources:
          reservations:
            devices:
              - capabilities: [gpu]
  fastapi_yolo:
    build:
      context: ./FASTAPI_YOLO_IMAGE
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    depends_on:
      # - nosql
      - sql
    deploy:
        resources:
          reservations:
            devices:
              - capabilities: [gpu]
