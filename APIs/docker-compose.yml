version: '3.8'

services:
  rabbitmq:
    build: ./rabbitmq
    container_name: rabbitmq
    ports:
      - "5672:5672"  # Porta do RabbitMQ
      - "15672:15672"  # Painel de gerenciamento
    environment:
      RABBITMQ_DEFAULT_USER: rdt
      RABBITMQ_DEFAULT_PASS: 123456
      RABBITMQ_CONSUMER_TIMEOUT: 43200000
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      timeout: 3s
      retries: 3

  fastapi_sign_classification:
    build:
      context: ./FASTAPI_SIGN_CLASSIFICATION
      dockerfile: Dockerfile
    ports:
      - "8016:8016"
    depends_on:
      # - nosql
      - sql
    deploy:
        resources:
          reservations:
            devices:
              - capabilities: [gpu]
    devices:
    - /dev/nvidia0:/dev/nvidia0
    - /dev/nvidiactl:/dev/nvidiactl
    - /dev/nvidia-uvm:/dev/nvidia-uvm
    - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools


  fastapi_yolo:
    build:
      context: ./FASTAPI_YOLO_IMAGE
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    depends_on: []
      # - nosql
      # - sql
    deploy:
        resources:
          reservations:
            devices:
              - capabilities: [gpu]
    devices:
    - /dev/nvidia0:/dev/nvidia0
