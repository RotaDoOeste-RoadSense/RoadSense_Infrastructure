version: '3.8'

services:
  rabbitmq:
    build: ./rabbitmq
    container_name: rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER:-rdt}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASS:-123456}
      RABBITMQ_CONSUMER_TIMEOUT: 43200000
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 5s
      timeout: 3s
      retries: 3

  sign_classifier:
    build:
      context: ./FASTAPI_SIGN_CLASSIFIER
      dockerfile: Dockerfile
    ports:
      - "8016:8016"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  sign_detector:
    container_name: plate
    build:
      context: ./FASTAPI_SIGN_DETECTOR
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    depends_on: []
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  geo_gps_predictor:
    build:
      context: ./FASTAPI_GEO_GPS_PREDICTOR
      dockerfile: Dockerfile
    ports:
      - "8011:8011"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  trip_manager:
    build:
      context: ./FASTAPI_TRIP_MANAGER
      dockerfile: Dockerfile
    ports:
      - "8013:8013"
    depends_on:
      - sql
    # sem GPU

  guardrail_detector:
    container_name: defensa_container
    build:
      context: ./FASTAPI_GUARDRAIL_DETECTOR
      dockerfile: Dockerfile
    ports:
      - "8700:8700"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    ipc: host
    shm_size: '2gb'
    ulimits:
      memlock: -1
      stack: 67108864

  guardrail_quality:
    container_name: defensa_vae
    build:
      context: ./FASTAPI_GUARDRAIL_QUALITY
      dockerfile: Dockerfile
    ports:
      - "8702:8702"
    depends_on:
      - sql
      - guardrail_detector
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    ipc: host
    shm_size: '2gb'
    ulimits:
      memlock: -1
      stack: 67108864

  guardrail_segmenter:
    container_name: defensa_sam
    build:
      context: ./FASTAPI_GUARDRAIL_SEGMENTER
      dockerfile: Dockerfile
    ports:
      - "8703:8703"
    depends_on:
      - sql
      - guardrail_detector
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    ipc: host
    shm_size: '2gb'
    ulimits:
      memlock: -1
      stack: 67108864

  outflow_detector:
    build:
      context: ./FASTAPI_OUTFLOW_DETECTOR
      dockerfile: Dockerfile
    ports:
      - "8421:8421"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  horizontal_marking_analyst:
    build:
      context: ./FASTAPI_HORIZONTAL_MARKING_ANALYST
      dockerfile: Dockerfile
    ports:
      - "8024:8024"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  vegetation_cube_analyst:
    build:
      context: ./FASTAPI_VEGETATION_CUBE_ANALYST
      dockerfile: Dockerfile
    ports:
      - "8500:8500"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0



  drainage_detector:
    build:
      context: ./FASTAPI_DRAINAGE_DETECTOR
      dockerfile: Dockerfile
    ports:
      - "8035:8035"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  geometries:
    build:
      context: ./GEOMETRIES
      dockerfile: Dockerfile
    environment:
      - HOST=sql
    depends_on:
      - sql

  sql:
    build:
      context: ./SQL
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SQL_PORT:-1111}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-mydatabase}
      POSTGRES_USER: ${DB_USER:-myuser}
      POSTGRES_PASSWORD: ${DB_PASS:-mypassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6381:6379"
    command: redis-server --requirepass ${REDIS_PASS:-rdt_cache_pass} --appendonly yes --maxmemory 500gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASS:-rdt_cache_pass}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  postgres-data:
  redis-data: