version: '3.8'

services:
  rabbitmq:
    build: ./rabbitmq
    container_name: rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rdt
      RABBITMQ_DEFAULT_PASS: 123456
      RABBITMQ_CONSUMER_TIMEOUT: 43200000
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 5s
      timeout: 3s
      retries: 3

  fastapi_sign_classification:
    build:
      context: ./FASTAPI_SIGN_CLASSIFICATION
      dockerfile: Dockerfile
    ports:
      - "8016:8016"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  fastapi_sign_detection:
    container_name: plate
    build:
      context: ./FASTAPI_SIGN_DETECTION
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    depends_on: []
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  fastapi_gps:
    build:
      context: ./FASTAPI_GPS_PREDICT
      dockerfile: Dockerfile
    ports:
      - "8011:8011"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  fastapi_init_new_trip:
    build:
      context: ./FASTAPI_GET_NEW_TRIP
      dockerfile: Dockerfile
    ports:
      - "8013:8013"
    depends_on:
      - sql
    # sem GPU

  fastapi_defensa:
    container_name: defensa_container
    build:
      context: ./FASTAPI_DEFENSA
      dockerfile: Dockerfile
    ports:
      - "8700:8700"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    ipc: host
    shm_size: '2gb'
    ulimits:
      memlock: -1
      stack: 67108864

  fastapi_defensa_vae:
    container_name: defensa_vae
    build:
      context: ./FASTAPI_DEFENSA_VAE
      dockerfile: Dockerfile
    ports:
      - "8702:8702"
    depends_on:
      - sql
      - fastapi_defensa
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    ipc: host
    shm_size: '2gb'
    ulimits:
      memlock: -1
      stack: 67108864

  fastapi_sam:
    container_name: defensa_sam
    build:
      context: ./FASTAPI_SAM
      dockerfile: Dockerfile
    ports:
      - "8703:8703"
    depends_on:
      - sql
      - fastapi_defensa
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    ipc: host
    shm_size: '2gb'
    ulimits:
      memlock: -1
      stack: 67108864

  fastapi_outflow:
    build:
      context: ./FASTAPI_OUTFLOW_DETECTION
      dockerfile: Dockerfile
    ports:
      - "8421:8421"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  fastapi_horizontal_signage:
    build:
      context: ./FASTAPI_HORIZONTAL_SIGNAGE
      dockerfile: Dockerfile
    ports:
      - "8024:8024"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['3']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  fastapi_vegetacao_cube:
    build:
      context: ./FASTAPI_VEGETACAO_CUBE
      dockerfile: Dockerfile
    ports:
      - "8500:8500"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0



  fastapi_drainage:
    build:
      context: ./FASTAPI_DRAINAGE_DETECTION
      dockerfile: Dockerfile
    ports:
      - "8035:8035"
    depends_on:
      - sql
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0

  geometries:
    build:
      context: ./GEOMETRIES
      dockerfile: Dockerfile
    environment:
      - HOST=sql
    depends_on:
      - sql

  sql:
    build:
      context: ./SQL
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1111:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6381:6379"
    command: redis-server --requirepass rdt_cache_pass --appendonly yes --maxmemory 500gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "rdt_cache_pass", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  postgres-data:
  redis-data: