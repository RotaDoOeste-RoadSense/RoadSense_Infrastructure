  fastapi_defensa_yolo:
    container_name: defensa_yolo_container
    build:
      context: ./FASTAPI_DEFENSA_YOLO
      dockerfile: Dockerfile
    ports:
      - "8700:8700"
    depends_on:
      # - nosql
      - sql
    deploy:
        resources:
          reservations:
            devices:
              - capabilities: [gpu]
    ipc: host  
    shm_size: '2gb'  
    ulimits:
      memlock: -1 
      stack: 67108864 
    devices:
    - /dev/nvidia0:/dev/nvidia0
    - /dev/nvidiactl:/dev/nvidiactl
    - /dev/nvidia-uvm:/dev/nvidia-uvm
    - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
    

